enum OrderStatus {
  ORDER_ACCEPTED
  ORDER_RECEIVED
  REQUEST_REVIEW
  DELIVERY_UPDATE
  COMPLETE
  CANCELED
  PENDING
  DISPUTE_RESOLUTION
  RFF_REPLY_SENT
  RFQ_REPLY_SENT
  ORDER_DELIVERED
  ORDER_SHIPPED
  IN_TRANSIT
  PAYMENT
  ORDER_ARRIVED
}

enum OrderType {
  PENDING
  IN_PROGRESS
  COMPLETE
}

type Order @model @auth(rules: [{allow: public}]) {
  id: ID!
  orderType: OrderType
  orderStatus: OrderStatus
  agreement: String
  userID: ID! @index(name: "byUser")
  orderDate: AWSDateTime
  rfqID: ID! @index(name: "byRFQ")
  rffID: ID! @index(name: "byRFF")
  toImage: String
  toCountry: String
  fromImage: String
  fromCountry: String
  orderMessage: String
}

enum RFFTYPE {
  AIR
  OCEAN
  LAND
}

enum RFQTYPE {
  STANDARD
  DOMESTIC
  INTERNATIONAL
}

type RFQ @model @auth(rules: [{allow: public}]) {
  id: ID!
  rfqType: RFQTYPE
  title: String
  requestCategory: String
  description: String
  documents: String
  productName: String
  tags: [String]
  qty: Int
  buyFrequency: String
  budget: Float
  placeOrigin: String
  landmark: String
  unit: String
  incoterms: String
  placeDestination: String
  deliveryPeriod: String
  expiryDate: String
  paymentType: String
  paymentMethod: String
  warranty: String
  returnPolicy: String
  userID: ID! @index(name: "byUser")
  Orders: [Order] @hasMany(indexName: "byRFQ", fields: ["id"])
  countryFlag: String
  countryName: String
  city: String
}

type RFF @model @auth(rules: [{allow: public}]) {
  id: ID!
  rffType: RFFTYPE
  title: String
  deliveryPeriod: AWSDate
  requestCategory: String
  productName: String
  handling: String
  loadDate: AWSDate
  weight: String
  qty: Int
  packageType: String
  length: Float
  width: Float
  height: Float
  placeOrigin: String
  placeDestination: String
  relatedServices: [String]
  invoiceAmount: Float
  notes: String
  loadType: String
  container: String
  containerSize: String
  containerType: String
  containerCount: Int
  userID: ID! @index(name: "byUser")
  Orders: [Order] @hasMany(indexName: "byRFF", fields: ["id"])
  countryFlag: String
  countryName: String
  city: String
}

type Categories @model @auth(rules: [{allow: public}]) {
  id: ID!
  title: String
  image: String
  Products: [Product] @hasMany(indexName: "byCategories", fields: ["id"])
}

type Review @model @auth(rules: [{allow: public}]) {
  id: ID!
  name: String
  rating: Float
  comment: String
  userID: ID! @index(name: "byUser")
}

enum PriceType {
  FIXED
  NEGOTIABLE
}

type Product @model @auth(rules: [{allow: public}]) {
  id: ID!
  title: String
  images: [String]
  description: String
  rating: Float
  tags: [String]
  productCertification: [String]
  supplyCapacity: String
  minOrderQty: String
  unit: String
  packageType: String
  quantity: Int
  fobPrice: Float
  basePrice: PriceType
  deliveryTime: Int
  paymentType: String
  expiry: AWSDate
  packageDescription: String
  documents: [String]
  categoriesID: ID! @index(name: "byCategories")
  userID: ID! @index(name: "byUser")
}

enum AccountCategoryType {
  BUYER
  SELLER
}

enum IdentificationType {
  DRIVER_LICENSE
  NATIONAL_IDENTIFICATION_NUMBER
  VOTERS_CARD
  INTERNATIONAL_PASSPORT
}

enum AccountType {
  INDIVIDUAL
  BUSINESS
}

type User @model @auth(rules: [{allow: public}]) {
  id: ID!
  name: String!
  email: String!
  phone_number: String
  rating: Float
  accountType: String
  lat: Float
  lng: Float
  address: String
  city: String
  state: String
  zipCode: String
  lga: String
  totalOrders: Int
  level: String
  identification: IdentificationType
  identificationNumber: String
  keyProduct: String
  country: String
  inviteCode: String
  accountCategory: AccountCategoryType
  businessName: String
  logo: String
  backgroundImage: String
  images: [String]
  businessType: String
  certifications: [String]
  mainMarkets: [String]
  estRevenue: Float
  totalStaff: Int
  responseTime: AWSTimestamp
  languages: [String]
  legalRep: String
  overview: String
  memberType: String
  Orders: [Order] @hasMany(indexName: "byUser", fields: ["id"])
  Products: [Product] @hasMany(indexName: "byUser", fields: ["id"])
  Reviews: [Review] @hasMany(indexName: "byUser", fields: ["id"])
  RFQS: [RFQ] @hasMany(indexName: "byUser", fields: ["id"])
  RFFS: [RFF] @hasMany(indexName: "byUser", fields: ["id"])
}
 